<div class="h-1 bg-inst-gold shrink-0"></div>

</div>
<div id="taskBackdrop" class="hidden fixed inset-0 bg-slate-900/20 z-40" onclick="closeTask()"></div>

<script>

{const _g=(k,a)=>{const t=TASKS.find(x=>x.key===k);if(t)t.gastos=a;};

const fdate=d=>d?d.slice(8,10)+'/'+d.slice(5,7):'—';

function delWorkspace(wid){
  const w=WORKSPACES.find(x=>x.id===wid);if(!w||w.primary)return;
  if(!(CURRENT.role==='admin'||CURRENT.id===w.leader))return;
  const pids=PROJECTS.filter(p=>(p.workspaceId||'ws1')===wid).map(p=>p.id);
  const nd=TASKS.filter(t=>!t.projectId&&(t.workspaceId||'ws1')===wid).length;
  confirmModal('Eliminar espacio de trabajo','¿Seguro que deseas eliminar el espacio «'+w.name+'»? Se eliminarán también sus '+pids.length+' proyecto(s) y '+nd+' tarea(s) directa(s). Esta acción no se puede deshacer.',()=>{
    TASKS=TASKS.filter(t=>!(pids.includes(t.projectId)||((!t.projectId)&&(t.workspaceId||'ws1')===wid)));
    PROJECTS=PROJECTS.filter(p=>(p.workspaceId||'ws1')!==wid);
    WORKSPACES.splice(WORKSPACES.findIndex(x=>x.id===wid),1);
    if(CURRENT_WS===wid)CURRENT_WS=(WORKSPACES.find(x=>x.primary)||WORKSPACES[0]).id;

    buildNav(); renderEspacios();

}

function modalField(f){
  const base='w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-800 outline-none focus:border-inst focus:ring-2 focus:ring-inst/15';
  let inp;
  if(f.type==='select') inp=`<select name="${f.name}" ${f.required?'required':''} class="${base}">${f.options.map(o=>{const v=o.v??o,l=o.l??o;return `<option value="${v}" ${f.value===v?'selected':''}>${l}</option>`;}).join('')}</select>`;
  else if(f.type==='textarea') inp=`<textarea name="${f.name}" rows="2" placeholder="${f.ph||''}" class="${base}">${f.value||''}</textarea>`;
  else inp=`<input name="${f.name}" type="${f.type||'text'}" value="${f.value??''}" placeholder="${f.ph||''}" ${f.required?'required':''} class="${base}"/>`;
  return `<div class="${f.full?'col-span-2':''}"><label class="block text-xs font-medium text-slate-500 mb-1">${f.label}</label>${inp}</div>`;
}

      <span class="font-mono text-xs text-slate-400">${t.key}</span>
      <button onclick="closeTask()" class="w-7 h-7 grid place-items-center rounded-lg text-slate-400 hover:bg-slate-100" title="Cerrar">✕</button></div>
    <div class="p-4 space-y-4 overflow-y-auto" style="height:calc(100% - 49px)">
      ${t.origin==='instruccion'?`<div class="text-xs px-2.5 py-1.5 rounded-lg bg-inst/10 text-inst font-medium">📌 Instrucción directa de ${t.enviadaPor||'Dirección'}</div>`:''}
      <input id="t_title" value="${t.title.replace(/"/g,'&quot;')}" class="w-full text-lg font-semibold text-slate-900 outline-none border-b border-transparent focus:border-slate-200 pb-1"/>
      <div class="grid grid-cols-2 gap-3">
        <label class="text-xs text-slate-500">Estado<select id="t_e" class="mt-1 w-full rounded-lg border border-slate-200 px-2 py-1.5 text-sm outline-none focus:border-inst">${estadoOpts(t.estado)}</select></label>
        <label class="text-xs text-slate-500">Responsable<select id="t_w" class="mt-1 w-full rounded-lg border border-slate-200 px-2 py-1.5 text-sm outline-none focus:border-inst">${whoOpts(t.who)}</select></label>
        <label class="text-xs text-slate-500">Prioridad<select id="t_p" class="mt-1 w-full rounded-lg border border-slate-200 px-2 py-1.5 text-sm outline-none focus:border-inst">${prioOpts(t.prioridad)}</select></label>
        <label class="text-xs text-slate-500">Vencimiento<input id="t_v" type="date" value="${t.vence||''}" class="mt-1 w-full rounded-lg border border-slate-200 px-2 py-1.5 text-sm outline-none focus:border-inst"/></label>
        <label class="text-xs text-slate-500 col-span-2">Presupuesto asignado<input id="t_b" type="number" value="${t.presupuesto||0}" class="mt-1 w-full rounded-lg border border-slate-200 px-2 py-1.5 text-sm outline-none focus:border-inst"/></label>
      </div>
      <div class="rounded-lg bg-emerald-50 border border-emerald-200 p-3">
        <div class="flex items-center justify-between mb-1.5"><span class="text-xs font-semibold text-emerald-700 uppercase">💵 Gastos ejecutados</span><span class="text-sm font-bold text-emerald-700 tabular-nums">${money(taskGasto(t))}</span></div>
        <div class="space-y-1 mb-2">${(t.gastos||[]).map((g,i)=>`<div class="flex items-center gap-2 text-sm"><span class="flex-1 text-slate-600 truncate">${g.desc||'Gasto'} <span class="text-[10px] text-slate-400">${fdate(g.fecha)}</span></span><span class="text-slate-700 tabular-nums">${money(g.monto)}</span><button data-gi="${i}" class="gdel text-slate-300 hover:text-rose-500">×</button></div>`).join('')||'<div class="text-xs text-slate-400">Sin gastos registrados.</div>'}</div>
        <div class="flex gap-2"><input id="g_desc" placeholder="Concepto del gasto" class="flex-1 rounded-lg border border-slate-200 px-2.5 py-1.5 text-sm outline-none focus:border-inst"/><div class="relative w-24"><span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span><input id="g_monto" type="number" placeholder="monto" class="w-full rounded-lg border border-slate-200 pl-6 pr-2 py-1.5 text-sm outline-none focus:border-inst"/></div><button id="g_add" class="rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white text-sm px-3 font-medium">+</button></div>
      </div>
      <div><div class="text-xs font-semibold text-slate-500 uppercase mb-1.5">Descripción</div>
        <textarea id="t_d" rows="2" placeholder="Añade una descripción…" class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-inst">${t.desc||''}</textarea></div>
      <div>
        <div class="text-xs font-semibold text-slate-500 uppercase mb-1.5">📎 Archivos</div>
        <div class="space-y-1 mb-2">${(t.archivos||[]).map((f,i)=>`<div class="flex items-center gap-2 text-sm"><span>📄</span><span class="flex-1 text-slate-600 truncate">${f.name}</span><button data-fi="${i}" class="fdel text-slate-300 hover:text-rose-500">×</button></div>`).join('')||'<div class="text-xs text-slate-400">Sin archivos adjuntos.</div>'}</div>
        <label class="inline-flex items-center gap-1.5 text-sm text-inst font-medium cursor-pointer hover:underline">📎 Adjuntar archivo<input id="t_file" type="file" multiple class="hidden"/></label></div>
      <div><div class="flex items-center justify-between mb-1.5"><span class="text-xs font-semibold text-slate-500 uppercase">Subtareas</span><span class="text-xs text-slate-400">${done}/${tot}</span></div>
        <div class="h-1.5 bg-slate-100 rounded-full mb-2 overflow-hidden"><div class="h-full bg-emerald-500" style="width:${tot?Math.round(done/tot*100):0}%"></div></div>
        <div class="space-y-1.5">${t.checklist.map((x,i)=>`<div class="flex items-center gap-2 text-sm">
          <input type="checkbox" data-i="${i}" ${x.done?'checked':''} class="ck accent-[#1e3a8a] shrink-0 w-4 h-4"/>
          <input data-ti="${i}" value="${(x.text||'').replace(/"/g,'&quot;')}" placeholder="Nombre de la subtarea…" class="cktext flex-1 min-w-0 bg-transparent outline-none border-b border-transparent focus:border-slate-200 ${x.done?'line-through text-slate-400':'text-slate-700'}"/>
          ${x.done&&x.doneAt?`<span class="text-[10px] text-emerald-600 shrink-0" title="Completada">✓ ${fdate(x.doneAt)}</span>`:''}
          <button data-di="${i}" class="ckdel text-slate-300 hover:text-rose-500 shrink-0">×</button></div>`).join('')||'<div class="text-xs text-slate-400">Sin subtareas.</div>'}</div>
        <button id="t_addck" class="text-xs text-inst font-medium mt-2">+ Añadir subtarea</button></div>
      <div><div class="text-xs font-semibold text-slate-500 uppercase mb-2">Observaciones</div>
        <div class="space-y-2 mb-2">${t._c.map(c=>`<div class="text-sm"><span class="font-medium text-slate-700">${c.w}:</span> <span class="text-slate-600">${c.t}</span></div>`).join('')||'<div class="text-xs text-slate-400">Sin observaciones.</div>'}</div>
        <div class="flex gap-2"><input id="t_ci" placeholder="Escribe una observación…" class="flex-1 rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-inst"/><button id="t_cs" class="rounded-lg bg-inst hover:bg-inst-dark text-white text-sm px-3 font-medium">Guardar</button></div></div>
      ${(CURRENT.role==='admin'||(t.projectId?canEditProject(PROJECTS.find(x=>x.id===t.projectId)):t.who===CURRENT.id))?`<button onclick="delTask('${t.key}')" class="w-full mt-3 rounded-lg border border-rose-300 bg-rose-50 text-rose-600 hover:bg-rose-100 text-sm font-semibold py-2.5 flex items-center justify-center gap-2">🗑 Eliminar tarea</button>`:''}
    </div>`;
  document.getElementById('taskBackdrop').classList.remove('hidden');
  panel.classList.remove('translate-x-full');
  const u=()=>{REDRAW();};
  document.getElementById('t_title').onchange=e=>{t.title=e.target.value;u();};
  document.getElementById('t_e').onchange=e=>{t.estado=e.target.value;t.done=(e.target.value==='Completada');syncProjectStatus(t.projectId);u();};
  document.getElementById('t_w').onchange=e=>{t.who=e.target.value;u();};
  document.getElementById('t_p').onchange=e=>{t.prioridad=e.target.value;u();};
  document.getElementById('t_v').onchange=e=>{t.vence=e.target.value||null;u();};
  document.getElementById('t_b').onchange=e=>{t.presupuesto=+e.target.value||0;};
  document.getElementById('t_d').onchange=e=>{t.desc=e.target.value;};
  panel.querySelectorAll('.ck').forEach(c=>c.onchange=()=>{const it=t.checklist[+c.dataset.i];it.done=c.checked;it.doneAt=c.checked?HOY:null;openTask(key);u();});
  panel.querySelectorAll('.cktext').forEach(inp=>inp.onchange=()=>{t.checklist[+inp.dataset.ti].text=inp.value;u();});
  panel.querySelectorAll('.ckdel').forEach(b=>b.onclick=()=>{t.checklist.splice(+b.dataset.di,1);openTask(key);u();});
  document.getElementById('t_addck').onclick=()=>{t.checklist.push({text:'',done:false,doneAt:null});openTask(key);setTimeout(()=>{const ins=panel.querySelectorAll('.cktext');ins[ins.length-1]&&ins[ins.length-1].focus();},20);};
  document.getElementById('t_cs').onclick=()=>{const i=document.getElementById('t_ci');if(i.value.trim()){t._c.push({w:CURRENT.name.split(' ')[0],t:i.value.trim()});t.comments=(t.comments||0)+1;}u();closeTask();};
  document.getElementById('g_add').onclick=()=>{const m=+document.getElementById('g_monto').value;if(!m)return;const dsc=document.getElementById('g_desc').value.trim();(t.gastos=t.gastos||[]).push({monto:m,desc:dsc||'Gasto',fecha:HOY});logAct('registró un gasto en',t.title);openTask(key);u();};
  panel.querySelectorAll('.gdel').forEach(b=>b.onclick=()=>{t.gastos.splice(+b.dataset.gi,1);openTask(key);u();});
  const fileIn=document.getElementById('t_file'); if(fileIn)fileIn.onchange=e=>{[...e.target.files].forEach(f=>(t.archivos=t.archivos||[]).push({name:f.name,size:f.size}));logAct('adjuntó un archivo a',t.title);openTask(key);u();};
  panel.querySelectorAll('.fdel').forEach(b=>b.onclick=()=>{t.archivos.splice(+b.dataset.fi,1);openTask(key);u();});
}
function closeTask(){document.getElementById('taskPanel').classList.add('translate-x-full');document.getElementById('taskBackdrop').classList.add('hidden');}

// ═══════════════ SESIÓN ═══════════════
const roleLabel=r=>r==='admin'?'Directivo':'Funcionario';

// ── Permisos de proyecto: admin, dueño o usuario asignado ──
const canEditProject=p=> !p ? true : (CURRENT.role==='admin'||p.ownerId===CURRENT.id||(p.usuarios||[p.ownerId]).includes(CURRENT.id));

// ── Menú de usuario (configuración) ──
let DARK=false;
function closeMenus(){['bellMenu','userMenu','wsMenu','searchMenu'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('hidden');});}
function runSearch(){
  const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  const menu=document.getElementById('searchMenu');
  if(!q){menu.classList.add('hidden');menu.innerHTML='';return;}
  const res=[];
  visibleProjects().filter(p=>p.title.toLowerCase().includes(q)).slice(0,5).forEach(p=>res.push({ic:'💼',t:p.title,s:'Proyecto · '+memberName(p.ownerId),kind:'project',id:p.id}));
  visibleTasks().filter(t=>t.title.toLowerCase().includes(q)).slice(0,6).forEach(t=>res.push({ic:t.origin==='instruccion'?'📌':'✅',t:t.title,s:(t.origin==='instruccion'?'Instrucción':'Tarea')+' · '+efEstado(t),kind:'task',id:t.key}));
  MEMBERS.filter(m=>(m.name+' '+(m.cargo||'')+' '+(m.area||'')).toLowerCase().includes(q)).slice(0,4).forEach(m=>res.push({ic:'👤',t:m.name,s:(m.cargo||m.role)+' · '+m.area,kind:'user',id:m.id}));
  MEETINGS.filter(m=>m.workspaceId===CURRENT_WS&&m.title.toLowerCase().includes(q)).slice(0,3).forEach(m=>res.push({ic:'🎯',t:m.title,s:'Reunión · '+fdate(m.date),kind:'meeting',id:m.id}));
  if(!res.length){menu.innerHTML='<div class="px-4 py-4 text-sm text-slate-400 text-center">Sin resultados para «'+q+'»</div>';menu.classList.remove('hidden');return;}
  menu.innerHTML=res.map(r=>`<button onclick="searchGo('${r.kind}','${r.id}')" class="w-full text-left px-3 py-2 hover:bg-slate-50 flex items-center gap-2.5"><span>${r.ic}</span><div class="flex-1 min-w-0"><div class="text-sm text-slate-700 truncate">${r.t}</div><div class="text-[11px] text-slate-400">${r.s}</div></div></button>`).join('');
  menu.classList.remove('hidden');
}
function searchGo(kind,id){closeMenus();document.getElementById('searchInput').value='';
  if(kind==='project')renderProject(id);
  else if(kind==='task')openTask(id);
  else if(kind==='user')renderUsers();
  else if(kind==='meeting')renderMeetings();
}
function buildUserMenu(){
  document.getElementById('userMenu').innerHTML=`
    <div class="px-4 py-3 border-b border-slate-100"><div class="text-[10px] text-slate-400">Sesión iniciada como</div><div class="font-semibold text-slate-800 text-sm">${CURRENT.name}</div></div>
    <button onclick="perfilConfig()" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2.5">⚙️ Configuración de Perfil</button>
    <button onclick="cambiarPass()" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2.5">🔑 Cambiar Contraseña</button>
    <div class="px-4 py-2.5 text-sm text-slate-700 flex items-center justify-between"><span class="flex items-center gap-2.5">🌙 Modo Oscuro</span><button onclick="toggleDark(event)" class="w-9 h-5 rounded-full ${DARK?'bg-inst':'bg-slate-300'} relative transition-colors shrink-0"><span class="absolute top-0.5 w-4 h-4 bg-white rounded-full transition-all" style="left:${DARK?'18px':'2px'}"></span></button></div>
    <button onclick="logout()" class="w-full text-left px-4 py-2.5 text-sm text-rose-600 hover:bg-rose-50 flex items-center gap-2.5 border-t border-slate-100">⎋ Cerrar Sesión</button>`;
}
// ── Sistema de alertas (campana) ──
let DISMISSED=new Set();
function alertList(){
  const mine=visibleTasks(); const raw=[];
  mine.filter(isVencida).forEach(t=>raw.push({id:'v'+t.key,ic:'⚠️',txt:'«'+t.title+'» vencida',sub:'Venció el '+fdate(t.vence),c:'rose'}));
  mine.filter(t=>t.vence===HOY&&t.estado!=='Completada').forEach(t=>raw.push({id:'h'+t.key,ic:'🔴',txt:t.title,sub:'Vence hoy',c:'amber'}));
  mine.filter(t=>t.vence>HOY&&t.vence<='2026-06-12'&&t.estado!=='Completada').forEach(t=>raw.push({id:'p'+t.key,ic:'🕒',txt:t.title,sub:'Plazo por vencer · '+fdate(t.vence),c:'slate'}));
  TASKS.filter(t=>t.origin==='instruccion'&&t.who===CURRENT.id&&t.estado!=='Completada').forEach(t=>raw.push({id:'i'+t.key,ic:'📌',txt:'Instrucción: '+t.title,sub:'De '+(t.enviadaPor||'Dirección'),c:'inst'}));
  MEETINGS.filter(m=>m.workspaceId===CURRENT_WS&&m.date>=HOY&&m.date<='2026-06-13').forEach(m=>raw.push({id:'r'+m.id,ic:'🎯',txt:'Reunión: '+m.title,sub:fdate(m.date)+' · '+m.time,c:'inst'}));
  return raw.filter(a=>!DISMISSED.has(a.id));
}
function buildBellMenu(){
  const items=alertList(); const total=items.length;
  let h=`<div class="px-4 py-2.5 border-b border-slate-100 font-semibold text-slate-800 text-sm flex items-center justify-between">🔔 Alertas <span class="flex items-center gap-2"><span class="text-xs text-slate-400">${total}</span>${total?`<button onclick="clearAlerts(event)" class="text-[11px] text-inst hover:underline font-normal">Limpiar todo</button>`:''}</span></div><div class="max-h-96 overflow-y-auto">`;
  if(!total)h+='<div class="px-4 py-6 text-center text-sm text-slate-400">✅ Sin alertas pendientes</div>';
  items.forEach(a=>{const cc=a.c==='inst'?'text-inst':'text-'+a.c+'-600';h+=`<div onclick="dismissAlert('${a.id}',event)" class="px-4 py-2.5 hover:bg-slate-50 flex items-start gap-2 border-b border-slate-50 cursor-pointer group"><span>${a.ic}</span><div class="flex-1 min-w-0"><div class="text-sm text-slate-700 truncate">${a.txt}</div><div class="text-[11px] ${cc}">${a.sub}</div></div><button onclick="dismissAlert('${a.id}',event)" class="text-slate-300 hover:text-rose-500 shrink-0">×</button></div>`;});
  h+='</div>';
  document.getElementById('bellMenu').innerHTML=h;
  const b=document.getElementById('bellBadge');
  if(total){b.textContent=total>9?'9+':total;b.classList.remove('hidden');}else b.classList.add('hidden');
}
function dismissAlert(id,e){if(e)e.stopPropagation();DISMISSED.add(id);buildBellMenu();}
function clearAlerts(e){if(e)e.stopPropagation();alertList().forEach(a=>DISMISSED.add(a.id));buildBellMenu();}
function toggleDark(e){if(e)e.stopPropagation();DARK=!DARK;document.body.classList.toggle('dark',DARK);buildUserMenu();}
function perfilConfig(){closeMenus();const m=MEMBERS.find(x=>x.id===CURRENT.id)||{};const em=(USERS.find(u=>u.id===CURRENT.id)||{}).email||'';
  openModal('Configuración de Perfil',[{name:'name',label:'Nombre',full:true,value:CURRENT.name},{name:'cargo',label:'Cargo',full:true,value:m.cargo||''},{name:'email',label:'Correo institucional',full:true,value:em}],
  d=>{CURRENT.name=d.name;if(m.id){m.name=d.name;m.cargo=d.cargo;}document.getElementById('userName').textContent=d.name;document.getElementById('userAvatar').textContent=initials(d.name);},'Guardar cambios');}
function cambiarPass(){closeMenus();openModal('Cambiar Contraseña',[{name:'a',label:'Contraseña actual',type:'password',full:true},{name:'b',label:'Nueva contraseña',type:'password',full:true},{name:'c',label:'Confirmar nueva contraseña',type:'password',full:true}],
  d=>{const u=USERS.find(x=>x.id===CURRENT.id);if(u&&d.b)u.pass=d.b;},'Actualizar contraseña');}

function showApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userName').textContent=CURRENT.name;
  document.getElementById('userRole').textContent=roleLabel(CURRENT.role);
  document.getElementById('userAvatar').textContent=initials(CURRENT.name);
  buildNav(); buildBellMenu(); renderPanel();
}
function logout(){CURRENT=null;document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');document.getElementById('loginPass').value='';}
document.getElementById('loginForm').addEventListener('submit',e=>{e.preventDefault();
  const em=document.getElementById('loginEmail').value.toLowerCase().trim(),pw=document.getElementById('loginPass').value;
  const u=USERS.find(x=>x.email===em&&x.pass===pw);const err=document.getElementById('loginError');
  if(!u){err.textContent='Credenciales inválidas.';err.classList.remove('hidden');return;}
  err.classList.add('hidden');CURRENT=u;showApp();});
document.querySelectorAll('.fill').forEach(b=>b.addEventListener('click',()=>{const[a,c]=b.dataset.fill.split('|');document.getElementById('loginEmail').value=a;document.getElementById('loginPass').value=c;}));
document.getElementById('bellBtn').onclick=e=>{e.stopPropagation();const m=document.getElementById('bellMenu');document.getElementById('userMenu').classList.add('hidden');if(m.classList.contains('hidden')){buildBellMenu();m.classList.remove('hidden');}else m.classList.add('hidden');};
document.getElementById('userBtn').onclick=e=>{e.stopPropagation();const m=document.getElementById('userMenu');document.getElementById('bellMenu').classList.add('hidden');if(m.classList.contains('hidden')){buildUserMenu();m.classList.remove('hidden');}else m.classList.add('hidden');};
document.getElementById('userMenu').onclick=e=>e.stopPropagation();
document.getElementById('bellMenu').onclick=e=>e.stopPropagation();
const _si=document.getElementById('searchInput'); if(_si){_si.oninput=runSearch; _si.onclick=e=>{e.stopPropagation();if(_si.value.trim())runSearch();};}
const _sm=document.getElementById('searchMenu'); if(_sm)_sm.onclick=e=>e.stopPropagation();
document.addEventListener('click',closeMenus);
</script>
</body>
</html>
