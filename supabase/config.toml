# Configuración del proyecto Supabase (CLI). Ajusta project_id al hacer `supabase link`.
project_id = "projectos"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:3000"
# Añade aquí la URL de Netlify tras desplegar:
additional_redirect_urls = ["http://localhost:3000", "https://TU-SITIO.netlify.app"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false   # en producción: true + SMTP

[storage]
enabled = true
file_size_limit = "50MiB"

[functions.ai-assistant]
verify_jwt = true
