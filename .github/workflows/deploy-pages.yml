name: Publicar en GitHub Pages

# Publica la carpeta prototype/ (sitio estático + Supabase) en GitHub Pages.
# Se ejecuta en cada push a main y también manualmente (Run workflow).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Subir la carpeta prototype
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./prototype
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
