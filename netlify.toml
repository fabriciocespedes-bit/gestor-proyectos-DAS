# ── Netlify · DAS Control de Gestión Sanitaria (Pozo Almonte) ───────────
# Despliegue HÍBRIDO: sitio estático (prototype/) + backend Supabase.
# La conexión a Supabase (URL + clave pública) ya va dentro de index.html,
# por eso NO se requieren variables de entorno ni build.

[build]
  # Publica la carpeta del prototipo tal cual (HTML + assets). Sin compilación.
  publish = "prototype"
  command = ""

# Cualquier ruta sirve la app (es una sola página).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeceras de seguridad básicas.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Nota: el frontend Next.js en apps/web queda como alternativa futura
# (su build usaba @netlify/plugin-nextjs). Hoy el producto es el prototipo.
